# REALLY NEEDED
windowrule = float on, match:class ^(flameshot)$
windowrule = move 0 0, match:class ^(flameshot)$
windowrule = pin on, match:class ^(flameshot)$
windowrule = no_anim on, match:class ^(flameshot)$


# CENTERED WINDOWS
windowrule = center on, match:class ^(pavucontrol|org.pulseaudio.pavucontrol|com.saivert.pwvucontrol)$
windowrule = center on, match:class ^([Ff]erdium)$

windowrule = center on, match:class ^([Tt]hunar)$, match:title ^(File Operation Progress)$
windowrule = center on, match:class ^([Tt]hunar)$, match:title ^(Confirm to replace files)$

windowrule = center on, match:title ^(ROG Control)$
windowrule = center on, match:title ^(Keybindings)$


windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = move (monitor_w*0.72) (monitor_h*0.07), match:title ^(Picture-in-Picture)$
windowrule = size (monitor_w*0.25) (monitor_h*0.25), match:title ^(Picture-in-Picture)$
windowrule = pin on, match:title ^(Picture-in-Picture)$


# FLOATING WINDOWS
windowrule = float on, match:class ^(org.kde.polkit-kde-authentication-agent-1)$
windowrule = float on, match:class ^([Zz]oom|onedriver|onedriver-launcher)$
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = float on, match:class ^(org.gnome.Calculator)$
windowrule = float on, match:class ^(codium|codium-url-handler|VSCodium)$, match:title ^(Add Folder to Workspace)$
windowrule = float on, match:class ^([Rr]ofi)$
windowrule = float on, match:class ^(eog|org.gnome.Loupe)$
windowrule = float on, match:class ^(nwg-look|qt5ct|qt6ct)$
windowrule = float on, match:class ^(mpv|com.github.rafostar.Clapper)$
windowrule = float on, match:class ^(nm-applet|nm-connection-editor|blueman-manager)$
windowrule = float on, match:class ^([Yy]ad)$
windowrule = float on, match:class ^(wihotspot(-gui)?)$
windowrule = float on, match:class ^(evince)$
windowrule = float on, match:class ^(file-roller|org.gnome.FileRoller)$
windowrule = float on, match:class ^([Bb]aobab|org.gnome.[Bb]aobab)$
windowrule = float on, match:title ^(Kvantum Manager)$
windowrule = float on, match:class ^([Qq]alculate-gtk)$


windowrule = float on, match:class ^([Ss]team)$, match:title ^((?![Ss]team).*|[Ss]team [Ss]ettings)$

# SIZES
windowrule = size (monitor_w*0.7) (monitor_h*0.7), match:class ^(gnome-system-monitor|org.gnome.SystemMonitor|io.missioncenter.MissionCenter)$
windowrule = size (monitor_w*0.7) (monitor_h*0.7), match:class ^(xdg-desktop-portal-gtk)$
windowrule = size (monitor_w*0.6) (monitor_h*0.7), match:title ^(Kvantum Manager)$
windowrule = size (monitor_w*0.6) (monitor_h*0.7), match:class ^(qt6ct)$
windowrule = size (monitor_w*0.7) (monitor_h*0.7), match:class ^(evince|wihotspot(-gui)?)$
windowrule = size (monitor_w*0.6) (monitor_h*0.7), match:class ^(file-roller|org.gnome.FileRoller)$
windowrule = size (monitor_w*0.6) (monitor_h*0.7), match:class ^([Ff]erdium)$


# PINNED / SPECIAL
windowrule = workspace 4, match:title ^(Wayclip App)$
